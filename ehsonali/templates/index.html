<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Maxfiylik Analizatori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .main-card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
        .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 15px; margin: 30px 0 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">🛡️ Maxfiylik Analizatori</h1>
            <p class="text-muted">Profilingiz va sayt xavfsizligini professional darajada tekshiring</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <form action="/analyze" method="post" class="card main-card p-4">
                    
                    <h4 class="section-title text-dark">1. Saytni tekshirish (HTTPS, SSL, WHOIS)</h4>
                    <input type="text" name="url_input" class="form-control mb-4 p-3" placeholder="Masalan: https://google.com">

                    <h4 class="section-title text-dark">2. Ijtimoiy tarmoq maxfiyligi</h4>
                    {% for q in questions %}
                    <div class="mb-4">
                        <p class="fw-bold mb-2">{{ loop.index }}. {{ q.text }}</p>
                        <div class="d-grid gap-2">
                            {% for opt in q.options %}
                            <input type="radio" class="btn-check" name="{{ q.id }}" id="{{ q.id }}_{{ loop.index }}" value="{{ opt.val }}" required>
                            <label class="btn btn-outline-primary text-start p-2" for="{{ q.id }}_{{ loop.index }}">{{ opt.text }}</label>
                            {% endfor %}
                        </div>
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-4 shadow">Tahlilni yakunlash</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
